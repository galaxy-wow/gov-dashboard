<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧适老化监管平台 - 政府端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased">

    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl">🏛</div>
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">智慧适老化监管平台</h1>
            <span class="ml-4 px-2.5 py-1 bg-gray-100 text-gray-600 text-xs font-medium rounded border border-gray-200">
                (已脱敏)
            </span>
        </div>
        <div class="flex items-center gap-4 text-sm font-medium text-gray-500">
            <span id="currentTime">加载时间...</span>
            <div class="w-px h-4 bg-gray-300"></div>
            <span class="flex items-center gap-1" id="networkStatus"><div class="w-2 h-2 rounded-full bg-gray-400"></div> 等待连接</span>
        </div>
    </header>

    <main class="p-6 max-w-[1600px] mx-auto space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center">
                <p class="text-sm text-gray-500 font-medium mb-1">总采集样本量</p>
                <div class="flex items-end gap-2">
                    <h3 class="text-3xl font-bold text-gray-900" id="totalRecords">-</h3>
                    <span class="text-sm text-gray-400 font-medium mb-1">来自数据库</span>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center opacity-70">
                <p class="text-sm text-gray-500 font-medium mb-1">今日活跃老人</p>
                <div class="flex items-end gap-2">
                    <h3 class="text-3xl font-bold text-gray-400">[待接入]</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center opacity-70">
                <p class="text-sm text-gray-500 font-medium mb-1">设备在线率</p>
                <div class="flex items-end gap-2">
                    <h3 class="text-3xl font-bold text-gray-400">[待接入]</h3>
                </div>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col justify-center opacity-70">
                <p class="text-sm text-gray-500 font-medium mb-1">未处理告警事件</p>
                <div class="flex items-end gap-2">
                    <h3 class="text-3xl font-bold text-gray-400">[待接入]</h3>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h3 class="text-lg font-bold text-gray-800">老人出行时段分布</h3>
                        <p class="text-xs text-gray-500 mt-1" id="dbStatus">正在从云端拉取聚合数据...</p>
                    </div>
                    <div class="bg-gray-100 p-1 rounded-lg flex text-sm font-medium">
                        <button onclick="switchChartType('pie')" id="btnPie" class="px-4 py-1.5 rounded-md bg-white shadow-sm text-blue-600 transition-all">饼图</button>
                        <button onclick="switchChartType('bar')" id="btnBar" class="px-4 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all">柱状</button>
                    </div>
                </div>
                <div id="timeChart" class="w-full h-[350px]"></div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <div class="flex justify-between items-center mb-4 border-b border-gray-100 pb-3">
                    <div class="flex items-center gap-2">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        <h3 class="text-lg font-bold text-gray-800">AI 智能分析报告</h3>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="exportDoc('PDF')" class="px-2 py-1 bg-gray-50 text-gray-600 text-xs font-medium rounded border border-gray-200 hover:bg-gray-100 transition">导出 PDF</button>
                        <button onclick="exportDoc('Word')" class="px-2 py-1 bg-gray-50 text-gray-600 text-xs font-medium rounded border border-gray-200 hover:bg-gray-100 transition">导出 Word</button>
                    </div>
                </div>
                
                <div class="flex-grow bg-gray-50 rounded-lg p-4 text-sm text-gray-600 leading-relaxed overflow-y-auto" style="max-height: 310px;" id="llmReportContent">
                    <div class="flex flex-col items-center justify-center h-full text-gray-400">
                        <svg class="animate-spin h-6 w-6 mb-2" xmlns="http://www.000webhost.com" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        等待数据源接入并生成报告...
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-6">
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 opacity-80">
                <div class="flex justify-between items-center mb-1">
                    <h3 class="text-lg font-bold text-gray-800">社区安全事件趋势图</h3>
                    <span class="text-xs text-gray-400 border border-gray-200 px-2 py-1 rounded">接口待开发</span>
                </div>
                <p class="text-xs text-gray-500 mb-4">数据源：告警记录子系统</p>
                <div id="trendChart" class="w-full h-[250px]"></div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. 顶部时钟逻辑 ---
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleString('zh-CN', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 2. Bmob 数据库与核心图表逻辑 ---
        let timeChartInstance = echarts.init(document.getElementById('timeChart'));
        let currentChartType = 'pie';
        let cachedTimeData = { morning: 0, afternoon: 0, evening: 0 };

        const APP_ID = "5174ab8872c6f263c123a59151b633a0";
        const REST_API_KEY = "751a308e7cb38b1d910557bceaf5234c";
        const CLOUD_FUNCTION_NAME = "getCityAgedData";

        function fetchAgedData() {
            document.getElementById('networkStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> 连接中...';
            
            fetch(`https://api.bmobcloud.com/1/functions/${CLOUD_FUNCTION_NAME}`, {
                method: 'POST',
                headers: {
                    'X-Bmob-Application-Id': APP_ID,
                    'X-Bmob-REST-API-Key': REST_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP Error! status: ${response.status}`);
                return response.json();
            })
            .then(res => {
                let serverData = res.result; 
                if (typeof serverData === 'string') {
                    try { serverData = JSON.parse(serverData); } catch (e) {}
                }
                
                if(serverData && serverData.code === 200) {
                    // 更新网络状态与总数
                    document.getElementById('networkStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div> 数据库已连接';
                    document.getElementById('dbStatus').innerText = "✅ 实时数据拉取成功";
                    document.getElementById('dbStatus').className = "text-xs text-green-600 mt-1";
                    document.getElementById('totalRecords').innerText = serverData.data.totalRecords;
                    
                    // 保存数据并渲染图表
                    cachedTimeData = serverData.data.timeDistribution;
                    renderChart();

                    // 根据真实的数据库数据，生成大模型报告
                    generateLLMReport(cachedTimeData, serverData.data.totalRecords);
                } else {
                    handleDbError(serverData.msg || "未知业务错误");
                }
            })
            .catch(error => {
                handleDbError("网络请求失败或跨域拦截");
            });
        }

        function handleDbError(errMsg) {
            document.getElementById('networkStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500"></div> 连接失败';
            document.getElementById('dbStatus').innerText = "❌ 报错：" + errMsg;
            document.getElementById('dbStatus').className = "text-xs text-red-500 mt-1";
            document.getElementById('llmReportContent').innerHTML = `<span class="text-red-500">无法连接数据源，分析报告生成中止。</span>`;
        }

        // 渲染饼图或柱状图
        function renderChart() {
            if (cachedTimeData.morning === 0 && cachedTimeData.afternoon === 0 && cachedTimeData.evening === 0) {
                timeChartInstance.clear();
                return;
            }

            const dataArr = [
                { value: cachedTimeData.morning, name: '早晨时段', itemStyle: { color: '#3b82f6' } },
                { value: cachedTimeData.afternoon, name: '下午时段', itemStyle: { color: '#10b981' } },
                { value: cachedTimeData.evening, name: '夜间时段', itemStyle: { color: '#f59e0b' } }
            ];

            let option = {};
            if (currentChartType === 'pie') {
                option = {
                    tooltip: { trigger: 'item', backgroundColor: 'rgba(255, 255, 255, 0.9)' },
                    legend: { bottom: '5%', icon: 'circle' },
                    series: [{
                        type: 'pie', radius: ['45%', '70%'], center: ['50%', '45%'],
                        avoidLabelOverlap: false,
                        itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                        label: { show: true, formatter: '{b}\n{c}人 ({d}%)', color: '#475569' },
                        data: dataArr
                    }]
                };
            } else {
                option = {
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '10%', top: '10%', containLabel: true },
                    xAxis: { type: 'category', data: ['早晨时段', '下午时段', '夜间时段'] },
                    yAxis: { type: 'value' },
                    series: [{
                        data: [
                            { value: cachedTimeData.morning, itemStyle: { color: '#3b82f6' } },
                            { value: cachedTimeData.afternoon, itemStyle: { color: '#10b981' } },
                            { value: cachedTimeData.evening, itemStyle: { color: '#f59e0b' } }
                        ],
                        type: 'bar', barWidth: '30%',
                        label: { show: true, position: 'top', color: '#475569' }
                    }]
                };
            }
            timeChartInstance.setOption(option, true);
        }

        function switchChartType(type) {
            currentChartType = type;
            document.getElementById('btnPie').className = type === 'pie' ? "px-4 py-1.5 rounded-md bg-white shadow-sm text-blue-600 transition-all" : "px-4 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all";
            document.getElementById('btnBar').className = type === 'bar' ? "px-4 py-1.5 rounded-md bg-white shadow-sm text-blue-600 transition-all" : "px-4 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all";
            renderChart();
        }

        // --- 3. 基于真实数据生成大模型报告 ---
        function generateLLMReport(timeData, total) {
            const maxVal = Math.max(timeData.morning, timeData.afternoon, timeData.evening);
            let peakTime = "早晨";
            if(maxVal === timeData.afternoon) peakTime = "下午";
            if(maxVal === timeData.evening) peakTime = "夜间";

            const dateStr = new Date().toLocaleDateString('zh-CN');
            
            const reportHTML = `
                <div class="mb-3">
                    <span class="bg-blue-100 text-blue-800 text-xs font-medium px-2.5 py-0.5 rounded">分析总结</span>
                    <span class="text-xs text-gray-400 ml-2">生成时间: ${dateStr}</span>
                </div>
                <p class="mb-2"><strong>数据基准：</strong>根据当前云端数据库实时聚合结果，本次共接入有效采集样本 <strong>${total}</strong> 条。</p>
                <p class="mb-2"><strong>行为特征分析：</strong>数据显示，该区域长者出行高峰集中在<strong>${peakTime}时段</strong>。具体分布为：早晨 ${timeData.morning} 人次，下午 ${timeData.afternoon} 人次，夜间 ${timeData.evening} 人次。</p>
                <p class="mb-2"><strong>AI 策略建议：</strong>
                    <ul class="list-disc pl-5 mt-1 space-y-1 text-gray-600">
                        <li>建议网格员在${peakTime}高峰期增加核心社区设施（如公园、菜市场等）的巡护频次。</li>
                        <li>夜间出行数据占比较低，需关注对应时段的路灯照明率及一键呼救设备的在线状况。</li>
                        <li><em class="text-gray-400">（需接入安全事件表后生成交叉分析建议）</em></li>
                    </ul>
                </p>
                <p class="mt-4 text-xs text-gray-400 border-t border-gray-200 pt-2">
                    * 本报告基于 Bmob 数据库实时拉取的数据驱动，由平台内置 AI 分析引擎自动生成，供决策参考。
                </p>
            `;
            
            document.getElementById('llmReportContent').innerHTML = reportHTML;
        }

        // --- 4. 导出文档逻辑 (占位) ---
        function exportDoc(type) {
            const reportContent = document.getElementById('llmReportContent').innerText;
            if (reportContent.includes('等待数据源接入')) {
                alert('数据尚未加载完毕，无法导出。');
                return;
            }
            // 真实项目中这里会接入 html2canvas+jspdf 或相关库
            alert(`系统提示：正在整理数据，准备下载 ${type} 格式报告...\n(此为系统操作模拟)`);
        }

        // --- 5. 趋势图空状态初始化 ---
        function renderEmptyTrendChart() {
            const trendChart = echarts.init(document.getElementById('trendChart'));
            trendChart.setOption({
                title: { text: '暂无安全事件数据', left: 'center', top: 'center', textStyle: { color: '#94a3b8', fontSize: 14, fontWeight: 'normal' } },
                xAxis: { type: 'category', data: [], show: false },
                yAxis: { type: 'value', show: false },
                series: []
            });
            window.addEventListener('resize', () => {
                timeChartInstance.resize();
                trendChart.resize();
            });
        }

        // 页面启动执行
        renderEmptyTrendChart();
        fetchAgedData();

    </script>
</body>
</html>
