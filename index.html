<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧适老化监管平台 - 政府端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
    <style>
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased h-screen flex flex-col">

    <header class="bg-white shadow-sm px-6 py-4 flex justify-between items-center z-50 flex-shrink-0">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white font-bold text-xl">🏛</div>
            <h1 class="text-xl font-bold text-gray-900 tracking-tight">智慧适老化监管平台</h1>
            <span class="ml-4 px-2.5 py-1 bg-gray-100 text-gray-600 text-xs font-medium rounded border border-gray-200">
                (已脱敏)
            </span>
        </div>
        <div class="flex items-center gap-4 text-sm font-medium text-gray-500">
            <span id="currentTime">加载时间...</span>
            <div class="w-px h-4 bg-gray-300"></div>
            <span class="flex items-center gap-1" id="networkStatus"><div class="w-2 h-2 rounded-full bg-gray-400"></div> 等待连接</span>
        </div>
    </header>

    <main class="p-6 max-w-[1600px] mx-auto w-full flex-grow">
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 h-[calc(100vh-140px)] min-h-[500px]">
            
            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 lg:col-span-2 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <div class="flex items-end gap-3">
                            <h3 class="text-lg font-bold text-gray-800">老人出行时段分布</h3>
                            <span class="text-xs text-gray-500 mb-0.5">样本总量：<strong id="totalRecords" class="text-blue-600">-</strong></span>
                        </div>
                        <p class="text-xs text-gray-500 mt-1" id="dbStatus">正在从云端拉取聚合数据...</p>
                    </div>
                    <div class="bg-gray-100 p-1 rounded-lg flex text-sm font-medium">
                        <button onclick="switchChartType('pie')" id="btnPie" class="px-4 py-1.5 rounded-md bg-white shadow-sm text-blue-600 transition-all">饼图</button>
                        <button onclick="switchChartType('bar')" id="btnBar" class="px-4 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all">柱状</button>
                    </div>
                </div>
                <div id="timeChart" class="w-full flex-grow"></div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col">
                <div class="flex items-center gap-2 mb-4 border-b border-gray-100 pb-3">
                    <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                    <h3 class="text-lg font-bold text-gray-800">AI 智能分析报告</h3>
                </div>
                
                <div class="flex-grow bg-gray-50 rounded-lg p-5 text-sm text-gray-600 leading-relaxed overflow-y-auto" id="llmReportContent">
                    <div class="flex flex-col items-center justify-center h-full text-gray-500">
                        <svg class="w-12 h-12 mb-3 text-blue-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path></svg>
                        
                        <p class="mb-5 text-sm" id="reportInitText">正在拉取基础数据，请稍候...</p>
                        
                        <button onclick="triggerReportGeneration()" id="btnGenerateReport" disabled 
                                class="px-5 py-2.5 bg-blue-600 text-white text-sm font-medium rounded-lg hover:bg-blue-700 transition shadow-md disabled:bg-gray-300 disabled:text-gray-500 disabled:cursor-not-allowed disabled:shadow-none flex items-center gap-2">
                            <span>✨</span> 点击生成意见反馈报告
                        </button>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- 1. 顶部时钟逻辑 ---
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toLocaleString('zh-CN', { hour12: false });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // --- 2. 基础配置与全局状态 ---
        const APP_ID = "5174ab8872c6f263c123a59151b633a0";
        const REST_API_KEY = "751a308e7cb38b1d910557bceaf5234c";
        
        let timeChartInstance = echarts.init(document.getElementById('timeChart'));
        let currentChartType = 'pie';
        
        // 缓存数据供 AI 生成使用
        let cachedTimeData = { morning: 0, afternoon: 0, evening: 0 };
        let currentTotalRecords = 0;

        // --- 3. 拉取时段数据 ---
        function fetchAgedData() {
            document.getElementById('networkStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> 连接中...';
            
            fetch(`https://api.bmobcloud.com/1/functions/getCityAgedData`, {
                method: 'POST',
                headers: {
                    'X-Bmob-Application-Id': APP_ID,
                    'X-Bmob-REST-API-Key': REST_API_KEY,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({})
            })
            .then(response => {
                if (!response.ok) throw new Error(`HTTP Error! status: ${response.status}`);
                return response.json();
            })
            .then(res => {
                let serverData = res.result; 
                if (typeof serverData === 'string') {
                    try { serverData = JSON.parse(serverData); } catch (e) {}
                }
                
                if(serverData && serverData.code === 200) {
                    document.getElementById('networkStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-green-500"></div> 数据库已连接';
                    document.getElementById('dbStatus').innerText = "✅ 实时数据拉取成功";
                    document.getElementById('dbStatus').className = "text-xs text-green-600 mt-1";
                    document.getElementById('totalRecords').innerText = serverData.data.totalRecords;
                    
                    // 保存到全局变量
                    cachedTimeData = serverData.data.timeDistribution;
                    currentTotalRecords = serverData.data.totalRecords;
                    renderChart();

                    // 【核心修改】数据拉取成功后，不自动跑 AI，而是点亮生成按钮
                    const btn = document.getElementById('btnGenerateReport');
                    const initText = document.getElementById('reportInitText');
                    if (btn && initText) {
                        btn.disabled = false;
                        initText.innerText = "数据源已就绪，可随时进行深度分析";
                        initText.className = "mb-5 text-sm text-gray-600";
                    }

                } else {
                    handleDbError(serverData.msg || "未知业务错误");
                }
            })
            .catch(error => {
                handleDbError("网络请求失败或跨域拦截");
            });
        }

        // --- 4. 渲染图表 ---
        function renderChart() {
            if (cachedTimeData.morning === 0 && cachedTimeData.afternoon === 0 && cachedTimeData.evening === 0) {
                timeChartInstance.clear();
                return;
            }

            const dataArr = [
                { value: cachedTimeData.morning, name: '早晨时段', itemStyle: { color: '#3b82f6' } },
                { value: cachedTimeData.afternoon, name: '下午时段', itemStyle: { color: '#10b981' } },
                { value: cachedTimeData.evening, name: '夜间时段', itemStyle: { color: '#f59e0b' } }
            ];

            let option = {};
            if (currentChartType === 'pie') {
                option = {
                    tooltip: { trigger: 'item', backgroundColor: 'rgba(255, 255, 255, 0.9)' },
                    legend: { bottom: '2%', icon: 'circle' },
                    series: [{
                        type: 'pie', radius: ['45%', '70%'], center: ['50%', '45%'],
                        avoidLabelOverlap: false,
                        itemStyle: { borderRadius: 6, borderColor: '#fff', borderWidth: 2 },
                        label: { show: true, formatter: '{b}\n{c}人 ({d}%)', color: '#475569' },
                        data: dataArr
                    }]
                };
            } else {
                option = {
                    tooltip: { trigger: 'axis', axisPointer: { type: 'shadow' } },
                    grid: { left: '3%', right: '4%', bottom: '5%', top: '10%', containLabel: true },
                    xAxis: { type: 'category', data: ['早晨时段', '下午时段', '夜间时段'] },
                    yAxis: { type: 'value' },
                    series: [{
                        data: [
                            { value: cachedTimeData.morning, itemStyle: { color: '#3b82f6' } },
                            { value: cachedTimeData.afternoon, itemStyle: { color: '#10b981' } },
                            { value: cachedTimeData.evening, itemStyle: { color: '#f59e0b' } }
                        ],
                        type: 'bar', barWidth: '30%',
                        label: { show: true, position: 'top', color: '#475569' }
                    }]
                };
            }
            timeChartInstance.setOption(option, true);
        }

        function switchChartType(type) {
            currentChartType = type;
            document.getElementById('btnPie').className = type === 'pie' ? "px-4 py-1.5 rounded-md bg-white shadow-sm text-blue-600 transition-all" : "px-4 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all";
            document.getElementById('btnBar').className = type === 'bar' ? "px-4 py-1.5 rounded-md bg-white shadow-sm text-blue-600 transition-all" : "px-4 py-1.5 rounded-md text-gray-500 hover:text-gray-800 transition-all";
            renderChart();
        }

        // --- 5. 按钮点击触发的生成中转函数 ---
        function triggerReportGeneration() {
            if (currentTotalRecords === 0) {
                alert("尚未拉取到基础数据，请稍后再试。");
                return;
            }
            // 调用核心的大模型流式生成函数
            generateLLMReport(cachedTimeData, currentTotalRecords);
        }

        // --- 6. 纯前端流式请求豆包大模型生成报告 ---
        async function generateLLMReport(timeData, total) {
            const reportContainer = document.getElementById('llmReportContent');
            const dateStr = new Date().toLocaleDateString('zh-CN');

            // 初始化流式 UI 框架，一旦开始生成，原来的按钮就会被这段 HTML 替换掉
            reportContainer.innerHTML = `
                <div class="mb-4 flex justify-between items-center border-b border-gray-200 pb-2">
                    <div>
                        <span class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-1 rounded flex items-center gap-1">
                            <span class="w-1.5 h-1.5 bg-blue-600 rounded-full animate-ping"></span>
                            AI 深度分析中
                        </span>
                        <span class="text-xs text-gray-400 ml-2">分析时间: ${dateStr}</span>
                    </div>
                </div>
                <div id="ai-typing-area" class="space-y-3 text-gray-700 text-sm leading-relaxed pb-4">
                    <span class="text-gray-400 animate-pulse">正在生成报告...</span>
                </div>
            `;

            const typingArea = document.getElementById('ai-typing-area');

            const prompt = `你是一个政府“智慧适老化监管平台”的专业 AI 数据分析师。
请根据以下数据生成深度分析报告：
- 监控区域总样本量：${total}人次
- 早晨：${timeData.morning}人次，下午：${timeData.afternoon}人次，夜间：${timeData.evening}人次。
要求：
1. 字数在 200 字左右。
2. 语气必须极其客观、严谨，符合政务公文风格。
3. 必须包含三块：【数据基准特征总结】、【异常或安全隐患剖析】、【针对性的网格化干预建议】。
4. 直接使用 HTML 标签（如 <h3>, <p>, <strong>, <ul>, <li>）进行排版，绝对不要输出 Markdown 的 \`\`\`html 代码块符号。`;

            
            const LLM_API_KEY = "4cea9432-264f-49bf-9381-53339fec28a9";
            const LLM_ENDPOINT_ID = "doubao-seed-2-0-mini-260215";

            try {
                const response = await fetch('https://ark.cn-beijing.volces.com/api/v3/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': 'Bearer ' + LLM_API_KEY
                    },
                    body: JSON.stringify({
                        model: LLM_ENDPOINT_ID,
                        messages: [
                            { role: 'system', content: '你是一个政府数据分析引擎。' },
                            { role: 'user', content: prompt }
                        ],
                        temperature: 0.3,
                        max_tokens: 1000,
                        stream: true
                    })
                });

                if (!response.ok) throw new Error(`HTTP Error! 状态码: ${response.status}`);

                const reader = response.body.getReader();
                const decoder = new TextDecoder('utf-8');
                let fullText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    
                    for (const line of lines) {
                        if (line.startsWith('data: ') && line !== 'data: [DONE]') {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.choices && data.choices[0].delta.content) {
                                    fullText += data.choices[0].delta.content;
                                    
                                    let cleanHTML = fullText.replace(/```html/gi, '').replace(/```/g, '');
                                    typingArea.innerHTML = cleanHTML + '<span class="inline-block w-1.5 h-4 ml-1 bg-blue-600 animate-pulse align-middle"></span>';
                                    
                                    const scrollContainer = document.getElementById('llmReportContent');
                                    scrollContainer.scrollTop = scrollContainer.scrollHeight;
                                }
                            } catch (e) {}
                        }
                    }
                }
                
                let finalHTML = fullText.replace(/```html/gi, '').replace(/```/g, '');
                typingArea.innerHTML = finalHTML + `
                    <p class="mt-8 text-xs text-gray-400 border-t border-gray-200 pt-3">
                        * 本报告基于平台数据库实时驱动，由大语言模型自动生成，内容仅供管理决策参考。
                    </p>`;

            } catch (error) {
                console.error("流式生成失败:", error);
                typingArea.innerHTML = `
                    <div class="text-red-500 text-sm flex flex-col items-center justify-center py-6">
                        <svg class="w-8 h-8 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p class="font-bold">AI 流式生成中断或失败</p>
                        <p class="text-xs mt-1 text-gray-500">错误信息: ${error.message}</p>
                    </div>
                `;
            }
        }

        function handleDbError(errMsg) {
            document.getElementById('networkStatus').innerHTML = '<div class="w-2 h-2 rounded-full bg-red-500"></div> 连接失败';
            document.getElementById('dbStatus').innerText = "❌ 报错：" + errMsg;
            document.getElementById('dbStatus').className = "text-xs text-red-500 mt-1";
            
            // 失败时也更新右侧面板状态，保持按钮不可用
            const initText = document.getElementById('reportInitText');
            if(initText) initText.innerText = "数据源连接失败，无法生成报告";
        }

        // 响应式图表自适应
        window.addEventListener('resize', () => {
            timeChartInstance.resize();
        });

        // 页面启动执行
        fetchAgedData();

    </script>
</body>
</html>
